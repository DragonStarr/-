services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: operator_day
      POSTGRES_USER: operator
      POSTGRES_PASSWORD: operator
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama

volumes:
  pgdata:
  ollama:
