services:
  postgres:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_DB: operator_day
      POSTGRES_USER: operator
      POSTGRES_PASSWORD: operator
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U operator -d operator_day"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

